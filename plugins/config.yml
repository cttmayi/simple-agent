# Simple Agent Shared Default Configuration
# This is the shared default configuration for all plugins.
#
# Configuration priority (highest to lowest):
# 1. Environment variables
# 2. Local config - .simple-agent/config.yml (project-specific, overrides this file)
# 3. User config - ~/.config/simple-agent/config.yml (user-level, overrides this file)
# 4. Plugin-specific config - plugins/default/config.yml (overrides this file)
# 5. Shared plugin config - plugins/config.yml (this file, acts as default)
# 6. Built-in default values
#
# Resource paths (agents, skills, hooks, commands):
# - Base paths are defined in plugins/default/.claude-plugin/plugin.json
# - Additional paths can be added here using skills_dir, agents_dir, hooks_dir, commands_dir
# - These additional paths are merged with the base paths (not replaced)
#

paths:
  tools_dir: ./.simple-agent/tools
  memory_dir: ./.simple-agent/memory
  logs_dir: ./.simple-agent/logs
  skills_dir: ~/.agents/skills

logging:
  enabled: true
  # log_dir: ./.simple-agent/logs  # Optional, defaults to ./.simple-agent/logs

# 工具配置：控制哪些工具对 LLM 可用
# 将工具设置为 false 可以禁用它，LLM 将看不到这个工具
# 默认情况下所有工具都可用（true）
tools:
  # 文件操作工具
  Read: true
  Write: true
  Edit: true

  # 搜索工具
  Grep: true
  Glob: true

  # 命令执行工具
  Bash: true

  # Skills 和 Agents
  Skill: true
  Agent: true

  # 任务管理工具
  TaskCreate: false
  TaskGet: false
  TaskUpdate: false
  TaskList: false

  # 示例：禁用 Bash 工具
  # Bash: false