# Simple Agent Configuration (Plugin Level)
# This configuration applies to all projects using this plugin.
# Project-specific configuration in .simple-agent/config.yml overrides these settings.

paths:
  skills_dirs:
    - ./plugins/default/skills
    - ~/.agents/skills
  agents_dir: ./plugins/default/agents
  hooks_dir: ./plugins/default/hooks
  commands_dir: ./plugins/default/commands
  tools_dir: ./.simple-agent/tools
  memory_dir: ./.simple-agent/memory
  logs_dir: ./.simple-agent/logs

ui:
  theme: dark
  show_thinking: true

logging:
  enabled: true
  # log_dir: ./.simple-agent/logs  # Optional, defaults to ./.simple-agent/logs